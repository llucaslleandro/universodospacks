<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Dashboard Black Phones</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: 'var(--color-primary)',
            secondary: 'var(--color-secondary)',
            accent: 'var(--color-accent)'
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  </style>
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen font-sans">
  
  <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
    <div class="text-center mb-8">
      <h1 id="login-store-name" class="text-2xl font-bold text-gray-900">Black Phones</h1>
      <p class="text-gray-500 text-sm mt-1">Acesso Restrito - Dashboard</p>
    </div>

    <form id="login-form" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Usuário</label>
        <input type="text" id="username" placeholder="Digite seu usuário" required
          class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent transition" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
        <input type="password" id="password" placeholder="Digite sua senha" required
          class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent transition" />
      </div>

      <div id="login-error" class="hidden text-sm text-red-600 bg-red-50 p-3 rounded-lg border border-red-100 text-center">
        Credenciais inválidas.
      </div>

      <button type="submit"
        class="w-full py-3.5 bg-gray-900 text-white font-semibold rounded-lg hover:bg-gray-800 transition-colors mt-2">
        Entrar na Dashboard
      </button>
    </form>
    
    <div class="mt-6 text-center">
      <a href="../index.html" class="text-sm text-gray-500 hover:text-gray-900 transition flex items-center justify-center gap-2">
        <i class="fa-solid fa-arrow-left"></i> Voltar para a Loja
      </a>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>

</html>
